services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    volumes:
      - backend_data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      - redis
    networks:
      - appnet

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    command: ["python", "-m", "app.worker"]
    depends_on:
      - redis
    networks:
      - appnet

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - appnet

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - appnet
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/certbot:/var/www/certbot
      - ./nginx/letsencrypt:/etc/letsencrypt
    networks:
      - appnet

volumes:
  backend_data:

networks:
  appnet:
    driver: bridge
